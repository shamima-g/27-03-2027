# Generated by design-api-agent
openapi: "3.0.3"
info:
  title: Contact Form & Admin Submissions Panel API
  version: "1.0.0"
  description: >
    REST API for the Contact Form & Admin Submissions Panel feature.
    Supports anonymous form submission by visitors and authenticated admin
    access to view all submissions. All endpoints are agent-inferred from
    the FRS — no user-provided spec was supplied (dataSource: api-in-development).

servers:
  - url: http://localhost:3001/api
    description: Local development server

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: >
        NextAuth.js session cookie. Set automatically after successful login.
        Required for all admin-only endpoints.

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
        details:
          type: array
          items:
            type: string
          description: Additional error details (e.g., validation errors)

    CreateSubmissionRequest:
      type: object
      required:
        - name
        - email
        - subject
        - message
      properties:
        name:
          type: string
          minLength: 1
          description: Submitter's full name (BR2 — required)
          example: "Jane Smith"
        email:
          type: string
          format: email
          description: >
            Submitter's email address. Must match user@domain.tld pattern.
            (BR1 — must be valid email format)
          example: "jane@example.com"
        subject:
          type: string
          enum:
            - "General Inquiry"
            - "Feedback"
            - "Support"
            - "Other"
          description: >
            Selected subject category. Must be one of the four allowed values.
            (R2, BR3 — required, enumerated values)
          example: "General Inquiry"
        message:
          type: string
          minLength: 1
          maxLength: 1000
          description: >
            Message body. Required, 1–1000 characters.
            (BR4, BR5 — required, max 1000 chars)
          example: "Hello, I'd like to get in touch about..."

    ContactSubmission:
      type: object
      required:
        - id
        - name
        - email
        - subject
        - message
        - submitted_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the submission
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: Submitter's full name
          example: "Jane Smith"
        email:
          type: string
          format: email
          description: Submitter's email address
          example: "jane@example.com"
        subject:
          type: string
          enum:
            - "General Inquiry"
            - "Feedback"
            - "Support"
            - "Other"
          description: Selected subject category
          example: "General Inquiry"
        message:
          type: string
          maxLength: 1000
          description: Full message text
          example: "Hello, I'd like to get in touch about..."
        submitted_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the submission was received
          example: "2026-03-04T07:02:00Z"

    SubmissionListItem:
      type: object
      description: >
        Abbreviated submission used in the admin inbox list.
        Message is truncated for preview display (R11).
      required:
        - id
        - name
        - email
        - subject
        - message_preview
        - submitted_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the submission
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: Submitter's full name (displayed prominently in card — R11)
          example: "Jane Smith"
        email:
          type: string
          format: email
          description: Submitter's email address
          example: "jane@example.com"
        subject:
          type: string
          enum:
            - "General Inquiry"
            - "Feedback"
            - "Support"
            - "Other"
          description: Selected subject category
          example: "General Inquiry"
        message_preview:
          type: string
          description: >
            Truncated message preview for display in the submission card.
            The API provides a pre-truncated value; the exact truncation
            length is left to implementation (R11 — "message preview (truncated)").
          example: "Hello, I'd like to get in touch about..."
        submitted_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp formatted for display (e.g., "March 4 at 7:02 AM" — R11)
          example: "2026-03-04T07:02:00Z"

    SubmissionsListResponse:
      type: object
      required:
        - submissions
        - total
      properties:
        submissions:
          type: array
          items:
            $ref: '#/components/schemas/SubmissionListItem'
          description: Array of submission list items
        total:
          type: integer
          description: Total number of submissions (for display; no pagination in this version)
          example: 42

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Admin username (seeded in config — BR6)
          example: "admin"
        password:
          type: string
          format: password
          description: Admin password
          example: "••••••••"

    LoginResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: Whether authentication succeeded
          example: true
        redirectTo:
          type: string
          description: URL to redirect the client to after successful login (R7)
          example: "/admin/submissions"

paths:

  # ─── Contact Form Submission (Public) ───────────────────────────────────────

  /v1/submissions:
    post:
      operationId: createSubmission
      summary: Submit a contact form
      description: >
        Accepts a contact form submission from an anonymous visitor.
        Validates all fields server-side and persists the record.
        No authentication required. (R1, R4, R5, BR1–BR5, CR1, CR5)
      x-requirements: [R1, R4, R5, BR1, BR2, BR3, BR4, BR5, CR5]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        "201":
          description: Submission created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - submitted_at
                properties:
                  id:
                    type: string
                    format: uuid
                    description: The ID of the newly created submission
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  submitted_at:
                    type: string
                    format: date-time
                    description: Server-assigned timestamp of receipt
                    example: "2026-03-27T07:02:00Z"
        "400":
          description: >
            Validation error. One or more fields failed server-side validation.
            Returns field-level details in the `details` array (BR1–BR5).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_email:
                  value:
                    error: "Validation failed"
                    code: "VALIDATION_ERROR"
                    details: ["Please enter a valid email address."]
                message_too_long:
                  value:
                    error: "Validation failed"
                    code: "VALIDATION_ERROR"
                    details: ["Message must be 1,000 characters or fewer."]
        "500":
          description: Server error — the submission could not be saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                server_error:
                  value:
                    error: "Internal server error"
                    code: "INTERNAL_ERROR"

    get:
      operationId: listSubmissions
      summary: List all contact form submissions (admin only)
      description: >
        Returns all submissions for display in the admin inbox.
        Submissions are returned in reverse chronological order (newest first).
        No search, filter, or sort parameters are supported (R11, R13).
        No pagination in this version — all submissions returned.
        Requires an authenticated admin session (R9, BR6, BR7).
      x-requirements: [R11, R13, R9, BR6, BR7]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Submissions list returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionsListResponse'
        "401":
          description: Not authenticated — no valid admin session (R9, R10)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthenticated:
                  value:
                    error: "Authentication required"
                    code: "UNAUTHENTICATED"
        "403":
          description: Authenticated but not authorized (non-admin session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    error: "Insufficient permissions"
                    code: "FORBIDDEN"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/submissions/{submissionId}:
    get:
      operationId: getSubmission
      summary: Get a single submission by ID (admin only)
      description: >
        Returns the full detail of a single submission for the admin detail view.
        Requires an authenticated admin session (R12, R9, BR6, BR7).
      x-requirements: [R12, R9, BR6, BR7]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      security:
        - SessionCookie: []
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the submission to retrieve
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "200":
          description: Submission detail returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSubmission'
        "401":
          description: Not authenticated — no valid admin session (R9, R10)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthenticated:
                  value:
                    error: "Authentication required"
                    code: "UNAUTHENTICATED"
        "403":
          description: Authenticated but not authorized (non-admin session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    error: "Insufficient permissions"
                    code: "FORBIDDEN"
        "404":
          description: Submission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  value:
                    error: "Submission not found"
                    code: "NOT_FOUND"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Admin Authentication ────────────────────────────────────────────────────
  # Note: NextAuth.js handles authentication internally via its own API routes
  # (/api/auth/signin, /api/auth/signout, /api/auth/session).
  # The endpoints below represent the logical authentication operations the FRS
  # requires. In the NextAuth credentials provider implementation, these map to
  # NextAuth's built-in route handlers rather than custom REST endpoints.
  # They are included here for completeness and mock layer coverage (R7, R8, R10).

  /v1/auth/session:
    get:
      operationId: getSession
      summary: Get current authentication session
      description: >
        Returns the current session state. Used by the frontend to determine
        if the user is authenticated and to handle session expiry (R9, R10).
      x-requirements: [R9, R10]
      x-source: agent-inferred
      x-provenance-note: >
        Best-guess design from FRS. In NextAuth, this maps to /api/auth/session.
        Included for mock layer coverage.
      responses:
        "200":
          description: Session state returned (may be null if unauthenticated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    nullable: true
                    description: Authenticated user info, or null if not authenticated
                    properties:
                      username:
                        type: string
                        example: "admin"
                      role:
                        type: string
                        enum: ["admin"]
                        example: "admin"
                  expires:
                    type: string
                    format: date-time
                    nullable: true
                    description: Session expiry timestamp
                    example: "2026-04-27T07:02:00Z"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
